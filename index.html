<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure Annotation Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Figure Annotation Tool</h1>
        </header>

        <div class="main-content">
            <!-- Left Panel: Controls -->
            <div class="left-panel">
                <div class="upload-section">
                    <h2>Upload Image</h2>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="imageInput" accept="image/*" style="display: none;">
                        <div class="upload-placeholder">
                            <p>Click to select or drag & drop an image</p>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Test Information</h2>
                    <div class="form-group">
                        <label for="runId">Run ID:</label>
                        <input type="text" id="runId" placeholder="e.g., 127-71">
                    </div>
                    <div class="form-group">
                        <label for="band">Band:</label>
                        <input type="text" id="band" placeholder="e.g., B6">
                    </div>
                    <div class="form-group">
                        <label for="location">Location:</label>
                        <input type="text" id="location" placeholder="e.g., Ambient">
                    </div>
                    <div class="form-group">
                        <label for="comments">Comments:</label>
                        <textarea id="comments" placeholder="Additional notes..."></textarea>
                    </div>
                </div>

                <div class="actions-section">
                    <h2>Actions</h2>
                    <button id="clearAnnotations" class="btn btn-secondary">Clear All Annotations</button>
                    <button id="exportImage" class="btn btn-primary">Export Annotated Figure</button>
                </div>
            </div>

            <!-- Right Panel: Image and Table -->
            <div class="right-panel">
                <!-- Information Table -->
                <div class="info-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Run</th>
                                <th>Band</th>
                                <th>Location</th>
                                <th>Comment</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td id="tableRun">-</td>
                                <td id="tableBand">-</td>
                                <td id="tableLocation">-</td>
                                <td id="tableComment">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Image Canvas Container -->
                <div class="image-container">
                    <canvas id="annotationCanvas"></canvas>
                    <div class="instruction-overlay" id="instructionOverlay">
                        <p>Upload an image to begin annotation</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Location Selection Modal -->
    <div id="locationModal" class="modal">
        <div class="modal-content">
            <h3>Select Annotation Location</h3>
            <p>Click on the image where you want to place the annotation:</p>
            <div id="locationCanvas"></div>
            <div class="modal-actions">
                <button id="cancelLocationSelect" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
